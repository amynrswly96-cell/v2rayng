name: Build Debug APK
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout modified code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download libv2ray
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar

      - name: Restore original build versions
        run: |
          sed -i 's/agp = .*/agp = "9.2.1"/' gradle/libs.versions.toml
          sed -i 's/compileSdk = .*/compileSdk = 37/' app/build.gradle.kts
          sed -i 's/targetSdk = .*/targetSdk = 35/' app/build.gradle.kts
          sed -i 's/distributionUrl=.*/distributionUrl=https\\:\/\/services.gradle.org\/distributions\/gradle-9.5.1-bin.zip/' gradle/wrapper/gradle-wrapper.properties
          echo "android.suppressUnsupportedCompileSdk=37" >> gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleFdroidDebug --no-daemon --warning-mode=none

      - uses: actions/upload-artifact@v4
        with:
          name: V2rayNG-debug-apk
          path: app/build/outputs/apk/fdroid/debug/*.apk
