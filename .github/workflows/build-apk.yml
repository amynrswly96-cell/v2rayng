name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.5.9/libv2ray.aar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK (fdroid flavor)
        run: ./gradlew assembleFdroidDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: V2rayNG-debug-apk
          path: app/build/outputs/apk/fdroid/debug/*.apk
